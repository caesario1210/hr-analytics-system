// ── Render ──────────────────────────────────────────────────
let currentTab = 'employee';
const sortState = {};

function renderSummary() {
  const cards = [
    {n:SUMMARY.emp_total,l:'Total Employees'},
    {n:SUMMARY.emp_active,l:'Active'},
    {n:SUMMARY.turnover_rate+'%',l:'Turnover Rate'},
    {n:'Rp '+Math.round(SUMMARY.avg_salary/1e6)+'M',l:'Avg Salary'},
    {n:SUMMARY.att_present_pct+'%',l:'Attendance'},
    {n:SUMMARY.hire_rate+'%',l:'Hire Rate'},
  ];
  document.getElementById('summary').innerHTML = cards.map(c =>
    '<div class="summary-card"><div class="num">'+c.n+'</div><div class="label">'+c.l+'</div></div>'
  ).join('');
}

function renderTab(key) {
  currentTab = key;
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-'+key));
  const panel = document.getElementById('panel-'+key);
  if (!panel.querySelector('tbody tr')) {
    buildTable(key);
  }
}

function buildTable(key) {
  const t = TABLES.find(x => x.key === key);
  const data = t.data;
  const cols = Object.keys(data[0]);
  const panel = document.getElementById('panel-'+key);
  const count = panel.querySelector('.count');
  count.textContent = 'Showing '+data.length+' rows (sample)';
  if (!sortState[key]) sortState[key] = {col:null,dir:1};
  const thead = panel.querySelector('thead');
  thead.innerHTML = cols.map(c => '<th data-col="'+c+'" onclick="sortTable(\''+key+'\',\''+c+'\')">'+formatCol(c)+'</th>').join('');
  renderRows(key, data);
  panel.querySelector('.search').oninput = function() {
    const q = this.value.toLowerCase();
    const filtered = data.filter(r => cols.some(c => String(r[c]??'').toLowerCase().includes(q)));
    renderRows(key, filtered);
    count.textContent = 'Showing '+filtered.length+' rows'+(q?' (filtered)':'');
  };
}

function renderRows(key, data) {
  const t = TABLES.find(x => x.key === key);
  const cols = Object.keys(t.data[0]);
  const st = sortState[key];
  if (st.col) {
    data = [...data].sort((a,b) => {
      const va = a[st.col], vb = b[st.col];
      if (va === null || va === undefined) return 1;
      if (vb === null || vb === undefined) return -1;
      if (typeof va === 'number') return (va - vb) * st.dir;
      return String(va).localeCompare(String(vb)) * st.dir;
    });
  }
  document.querySelector('#panel-'+key+' tbody').innerHTML = data.map(r =>
    '<tr>'+cols.map(c => {
      let v = r[c];
      if (v === null || v === undefined) return '<td></td>';
      if (typeof v === 'number' && c.includes('salary')) v = 'Rp '+Math.round(v).toLocaleString();
      return '<td>'+v+'</td>';
    }).join('')+'</tr>'
  ).join('');
}

function sortTable(key, col) {
  const st = sortState[key];
  if (st.col === col) st.dir *= -1;
  else { st.col = col; st.dir = 1; }
  const t = TABLES.find(x => x.key === key);
  renderRows(key, [...t.data]);
}

function formatCol(c) {
  return c.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());
}

renderSummary();
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
TABLES.forEach(t => {
  const btn = document.createElement('button');
  btn.textContent = t.label;
  btn.dataset.key = t.key;
  btn.onclick = () => renderTab(t.key);
  tabsEl.appendChild(btn);
  const panel = document.createElement('div');
  panel.id = 'panel-'+t.key;
  panel.className = 'panel'+(t.key===currentTab?' active':'');
  panel.innerHTML = '<input class="search" placeholder="Search..." /><div class="count">Loading...</div><div class="wrap"><table><thead></thead><tbody></tbody></table></div>';
  panelsEl.appendChild(panel);
});
renderTab('employee');
